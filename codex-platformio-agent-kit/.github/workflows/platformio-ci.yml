name: PlatformIO CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  native-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('examples/blink-dual/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: python -m pip install --upgrade platformio

      - name: Show environments
        run: python tools/pio_agent.py envs --project examples/blink-dual

      - name: Build native sample
        run: python tools/pio_agent.py build --project examples/blink-dual --env native

      - name: Test native sample
        run: python tools/pio_agent.py test --project examples/blink-dual --env native

  embedded-build-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        env: [esp32dev, pico]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('examples/blink-dual/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.env }}-
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO Core
        run: python -m pip install --upgrade platformio

      - name: Build embedded sample
        run: python tools/pio_agent.py build --project examples/blink-dual --env ${{ matrix.env }}
